# Prefer the monorepo-root railway.toml + Dockerfile (API + AI runtime).
# This file remains for an API-only service if you intentionally split workers.
#
# Full backend (recommended):
#   Root Directory  = .
#   Dockerfile path = Dockerfile
#   Config file     = railway.toml
#
# API-only (advanced — you must also deploy apps/ai-runtime separately):
#   Root Directory  = .
#   Dockerfile path = apps/api/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
