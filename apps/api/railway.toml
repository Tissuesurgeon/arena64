# Railway service config for Arena64 API
#
# Dashboard settings (required):
#   Root Directory  = .          (repository root — NOT apps/api)
#   Dockerfile path = apps/api/Dockerfile
#   Config file     = apps/api/railway.toml  (if prompted)
#
# Attach Railway Postgres + Redis; set DATABASE_URL and REDIS_URL.
# Also set SECRET_KEY, SERVICE_API_KEY, API_CORS_ORIGINS. See docs/deploy.md.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
